name: BIST Night Analyst

on:
  schedule:
    # Piyasa kapanışı sonrası, hafta içi her gün 19:00 TRT (UTC+3) -> 16:00 UTC
    - cron: "0 16 * * 1-5"
    # Haftalık genetik optimizasyon: Cumartesi 09:00 TRT -> 06:00 UTC
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      run_optimization:
        description: "Genetik parametre optimizasyonunu da çalıştır"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  nightly-analysis:
    if: github.event.schedule == '0 16 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Python kurulumu
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Gece analizini çalıştır
        run: python scripts/run_daily_analysis.py

      - name: Look-ahead denetimi
        run: python scripts/audit_lookahead.py

      - name: Sonuçları commit et
        run: |
          git config user.name "bist-night-analyst-bot"
          git config user.email "actions@github.com"
          git add data/processed data/models logs
          git diff --staged --quiet || git commit -m "chore: gece analizi sonuçları $(date -u +'%Y-%m-%d')"
          git push

      - name: Sinyal özetini e-posta ile gönder
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: "BIST Night Analyst <${{ secrets.EMAIL_USERNAME }}>"
          subject: "📊 BIST Gece Taraması – ${{ github.run_started_at }}"
          body: |
            BIST Night Analyst gece taraması tamamlandı.

            Tarih : ${{ github.run_started_at }}
            Durum : ${{ job.status }}
            Commit: https://github.com/${{ github.repository }}/commits/main

            Detaylı sonuçlar için Streamlit arayüzünü açın:
            https://<uygulamaniz>.streamlit.app

            ---
            Bu e-posta BIST Night Analyst tarafından otomatik gönderilmiştir.
            Yatırım tavsiyesi değildir. Nihai karar size aittir.

  weekly-optimization:
    if: github.event.schedule == '0 6 * * 6' || github.event.inputs.run_optimization == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Python kurulumu
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Genetik optimizasyonu çalıştır
        run: python scripts/train_model.py

      - name: Parametreleri commit et
        run: |
          git config user.name "bist-night-analyst-bot"
          git config user.email "actions@github.com"
          git add data/models
          git diff --staged --quiet || git commit -m "chore: haftalık parametre optimizasyonu $(date -u +'%Y-%m-%d')"
          git push

      - name: Optimizasyon sonucunu e-posta ile gönder
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: "BIST Night Analyst <${{ secrets.EMAIL_USERNAME }}>"
          subject: "🔧 BIST Haftalık Parametre Optimizasyonu – ${{ github.run_started_at }}"
          body: |
            Haftalık genetik algoritma optimizasyonu tamamlandı.

            Tarih : ${{ github.run_started_at }}
            Durum : ${{ job.status }}

            Güncel parametreler data/models/agent_params.json dosyasına kaydedildi.
            Yarından itibaren gece taramaları bu parametrelerle çalışacak.

            Detay: https://github.com/${{ github.repository }}/commits/main

            ---
            Bu e-posta BIST Night Analyst tarafından otomatik gönderilmiştir.
