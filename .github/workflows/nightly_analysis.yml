name: BIST Night Analyst

on:
  schedule:
    # Piyasa kapanışı sonrası, hafta içi her gün 19:00 TRT (UTC+3) -> 16:00 UTC
    - cron: "0 16 * * 1-5"
    # Haftalık genetik optimizasyon: Cumartesi 09:00 TRT -> 06:00 UTC
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      run_optimization:
        description: "Genetik parametre optimizasyonunu da çalıştır"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  nightly-analysis:
    if: github.event.schedule == '30 15 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Gece analizini çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/run_daily_analysis.py

      - name: Look-ahead denetimi
        run: python scripts/audit_lookahead.py

      - name: Sonuçları commit et
        run: |
          git config user.name "bist-night-analyst-bot"
          git config user.email "actions@github.com"
          git add data/processed data/models logs
          git diff --staged --quiet || git commit -m "chore: gece analizi sonuçları $(date -u +'%Y-%m-%d')"
          git push

  weekly-optimization:
    if: github.event.schedule == '0 6 * * 6' || github.event.inputs.run_optimization == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Genetik optimizasyonu çalıştır
        run: python scripts/train_model.py

      - name: Parametreleri commit et
        run: |
          git config user.name "bist-night-analyst-bot"
          git config user.email "actions@github.com"
          git add data/models
          git diff --staged --quiet || git commit -m "chore: haftalık parametre optimizasyonu $(date -u +'%Y-%m-%d')"
          git push
